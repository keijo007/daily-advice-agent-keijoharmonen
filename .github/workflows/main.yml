name: Daily Insight Generator

on:
  schedule:
    # Suoritetaan joka päivä 06:00 UTC (klo 8 Suomessa kesällä)
    - cron: '0 6 * * *'
  
  # Voit myös ajaa manuaalisesti
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  generate-insight:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'  # ← Cachaa pip-paketti (nopeutti ~50s)
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate daily insight
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ONEDRIVE_TENANT_ID: "consumers"
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_DAILY_INSIGHTS_SHARE_URL: "https://1drv.ms/f/c/fb436b6e01e2b556/IgDQ2XoqHUNtTbhooArtv_M3AfI5RJyLgUTzuHSSl9OUNHM?e=UAKBE6"
          ONEDRIVE_DIARY_SHARE_URL: "https://1drv.ms/t/c/fb436b6e01e2b556/IQCe88YLonb0QK1c0Z6sZwmyAb0eSO2mSZXv4E68dl7fYs4?e=KBrxUL"
          ONEDRIVE_DIARY2_SHARE_URL: "https://1drv.ms/t/c/fb436b6e01e2b556/IQDCd_gugRmoSqoCjXFhdTYxAY472Ap015v5ThWeW8NTs60?e=HLXaFe"
          ONEDRIVE_DIARY_FILE_PATH: "/MY KNOWLEDGE/Knowledge Base/main/Reflection.md"
          ONEDRIVE_WEEKLY_FILE_PATH: "/MY KNOWLEDGE/Knowledge Base/main/Thoughts.md"
          ONEDRIVE_DAILY_INSIGHTS_PATH: "/MY KNOWLEDGE/Knowledge Base/AI_Thoughts"
          ONEDRIVE_USER_ID: "keijohar@outlook.com"
          ONEDRIVE_LINKEDIN_EXPORT_PATH: "/MY KNOWLEDGE/Knowledge Base/Exports/LinkedIn"
          ONEDRIVE_WHATSAPP_EXPORT_PATH: "/MY KNOWLEDGE/Knowledge Base/Exports/WhatsApp"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_LOOKBACK_DAYS: "30"
          TELEGRAM_CHANNELS: "https://t.me/Oskar_Hartmann, https://t.me/MargulanSeissembai, https://t.me/INSTARDING, https://t.me/dobry, https://t.me/otaniemievents, https://t.me/aaltoes, https://t.me/aaltofounderschool, https://t.me/KonsensusRy/1, https://t.me/KonsensusRy/92550, https://t.me/KonsensusRy/92495"
          YOUTUBE_CHANNEL_URLS: "https://www.youtube.com/@oskar_hartmann1, https://www.youtube.com/@Margulan.Seissembai, https://www.youtube.com/@NordnetSuomi"
          YOUTUBE_LOOKBACK_DAYS: "14"
          YOUTUBE_WHISPER_ENABLED: "false"
          YOUTUBE_WHISPER_MAX_MINUTES: "120"
          LINKEDIN_LOOKBACK_DAYS: "14"
          WHATSAPP_LOOKBACK_DAYS: "14"
        run: |
          python scripts/generate_insight_safe.py
      
      - name: Commit and push results
        run: |
          git config user.email "action@github.com"
          git config user.name "Daily Insight Bot"
          git add data/daily_insights/
          git add index.html
          git commit -m "Daily insight $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to OneDrive (optional)
        run: |
          python scripts/upload_to_onedrive.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ONEDRIVE_TENANT_ID: "consumers"
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_DAILY_INSIGHTS_SHARE_URL: "https://1drv.ms/f/c/fb436b6e01e2b556/IgDQ2XoqHUNtTbhooArtv_M3AfI5RJyLgUTzuHSSl9OUNHM?e=UAKBE6"
          ONEDRIVE_DIARY_SHARE_URL: "https://1drv.ms/t/c/fb436b6e01e2b556/IQCe88YLonb0QK1c0Z6sZwmyAb0eSO2mSZXv4E68dl7fYs4?e=KBrxUL"
          ONEDRIVE_DIARY2_SHARE_URL: "https://1drv.ms/t/c/fb436b6e01e2b556/IQDCd_gugRmoSqoCjXFhdTYxAY472Ap015v5ThWeW8NTs60?e=HLXaFe"
          ONEDRIVE_DIARY_FILE_PATH: "/MY KNOWLEDGE/Knowledge Base/main/Reflection.md"
          ONEDRIVE_WEEKLY_FILE_PATH: "/MY KNOWLEDGE/Knowledge Base/main/Thoughts.md"
          ONEDRIVE_DAILY_INSIGHTS_PATH: "/MY KNOWLEDGE/Knowledge Base/AI_Thoughts"
          ONEDRIVE_USER_ID: "keijohar@outlook.com"
          ONEDRIVE_LINKEDIN_EXPORT_PATH: "/MY KNOWLEDGE/Knowledge Base/Exports/LinkedIn"
          ONEDRIVE_WHATSAPP_EXPORT_PATH: "/MY KNOWLEDGE/Knowledge Base/Exports/WhatsApp"
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_LOOKBACK_DAYS: "30"
          TELEGRAM_CHANNELS: "https://t.me/Oskar_Hartmann, https://t.me/MargulanSeissembai, https://t.me/INSTARDING, https://t.me/dobry, https://t.me/otaniemievents, https://t.me/aaltoes, https://t.me/aaltofounderschool, https://t.me/KonsensusRy/1, https://t.me/KonsensusRy/92550, https://t.me/KonsensusRy/92495"
          YOUTUBE_CHANNEL_URLS: "https://www.youtube.com/@oskar_hartmann1, https://www.youtube.com/@Margulan.Seissembai, https://www.youtube.com/@NordnetSuomi"
          YOUTUBE_LOOKBACK_DAYS: "14"
          YOUTUBE_WHISPER_ENABLED: "false"
          YOUTUBE_WHISPER_MAX_MINUTES: "120"
          LINKEDIN_LOOKBACK_DAYS: "14"
          WHATSAPP_LOOKBACK_DAYS: "14"
      
      - name: Display generated files
        run: |
          echo "📊 Generated files:"
          ls -la data/daily_insights/ || echo "No insights directory"
          echo ""
          echo "📄 Latest index:"
          head -20 index.html || echo "No index.html"
